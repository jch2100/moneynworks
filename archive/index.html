<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의 아카이브 | Money&Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .post-content { line-height: 1.7; color: #334155; word-break: break-all; }
        .post-content a { color: #2563EB; text-decoration: underline; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-start mb-12">
            <div>
                <a href="../" class="text-xs font-bold text-slate-400 hover:text-blue-600 transition tracking-wide">← 메인 홈페이지로 이동</a>
                <h1 class="text-4xl font-extrabold text-slate-900 mt-6 tracking-tighter uppercase">Archive</h1>
                <p class="text-slate-500 text-sm mt-3 font-medium">강의 가이드와 실무 인사이트를 확인하세요.</p>
            </div>
            <!-- 관리자 모드 버튼 -->
            <button onclick="activateAdmin()" class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-slate-300 hover:bg-white hover:text-blue-600 hover:border-blue-200 transition shadow-sm" title="관리자 모드">⚙️</button>
        </header>

        <!-- Admin Panel (통합 관리 환경) -->
        <div id="admin-panel" class="hidden mb-16 bg-white p-8 md:p-10 rounded-[2.5rem] shadow-xl border border-blue-100">
            <div class="flex gap-6 border-b border-slate-100 mb-8 pb-4">
                <button onclick="switchTab('tab-lecture')" id="btn-lecture" class="font-bold text-blue-600 border-b-2 border-blue-600 pb-1">새 게시글 작성</button>
                <button onclick="switchTab('tab-curriculum')" id="btn-curriculum" class="font-bold text-slate-400 hover:text-slate-600 pb-1">커리큘럼 관리</button>
            </div>

            <!-- Tab 1: 게시글 작성 -->
            <form id="tab-lecture" class="grid gap-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="lec-title" placeholder="글 제목을 입력하세요" required class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10">
                    <select id="lec-cat" class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10">
                        <option value="NOTICE">NOTICE (공지)</option>
                        <option value="INSIGHT">INSIGHT (인사이트)</option>
                        <option value="AI STRATEGY">AI STRATEGY</option>
                        <option value="SALES/FINANCE">SALES/FINANCE</option>
                    </select>
                </div>
                <textarea id="lec-content" placeholder="학습자들에게 전달할 본문 내용을 입력하세요. (엔터로 줄바꿈 가능)" rows="8" required class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10 resize-none"></textarea>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="url" id="lec-link" placeholder="참조 링크 (선택사항)" class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10">
                    <input type="text" id="lec-pass" placeholder="링크 암호 (선택사항)" class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10">
                </div>
                <button type="submit" class="bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition mt-2 shadow-lg shadow-blue-100">게시글 올리기</button>
            </form>

            <!-- Tab 2: 커리큘럼 관리 -->
            <form id="tab-curriculum" class="hidden grid gap-4">
                <input type="text" id="cur-title" placeholder="프로그램 제목" required class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10">
                <textarea id="cur-desc" placeholder="프로그램 설명 (2~3줄 요약)" required rows="2" class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10 resize-none"></textarea>
                <input type="url" id="cur-link" placeholder="제안서 구글 드라이브 링크" required class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10">
                <input type="number" id="cur-order" placeholder="노출 순서 (1, 2, 3...)" required class="p-4 rounded-xl border border-slate-100 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-blue-600/10">
                <button type="submit" class="bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-slate-800 transition mt-2">커리큘럼 업데이트</button>
                <p class="text-xs text-red-500 mt-1">* 메인 홈페이지의 'Curriculum' 섹션이 실시간으로 변경됩니다.</p>
            </form>
        </div>

        <!-- Post Feed List -->
        <div class="space-y-10" id="archive-list">
            <div class="py-20 text-center text-slate-300 font-bold tracking-tight">콘텐츠를 불러오는 중입니다...</div>
        </div>

        <footer class="mt-24 pt-8 border-t border-slate-200 text-[10px] text-slate-400 font-bold tracking-widest uppercase text-center">
            © 2026 Money&Works Archive System
        </footer>
    </div>

    <!-- UI Script -->
    <script>
        window.activateAdmin = () => {
            const masterKey = prompt("관리자 암호를 입력하세요.");
            if(masterKey === "2100") document.getElementById('admin-panel').classList.remove('hidden');
            else if(masterKey !== null) alert("권한이 없습니다.");
        };

        window.switchTab = (tabId) => {
            document.getElementById('tab-lecture').classList.add('hidden');
            document.getElementById('tab-curriculum').classList.add('hidden');
            document.getElementById('btn-lecture').className = "font-bold text-slate-400 pb-1";
            document.getElementById('btn-curriculum').className = "font-bold text-slate-400 pb-1";
            
            document.getElementById(tabId).classList.remove('hidden');
            const activeBtn = tabId === 'tab-lecture' ? 'btn-lecture' : 'btn-curriculum';
            document.getElementById(activeBtn).className = "font-bold text-blue-600 border-b-2 border-blue-600 pb-1";
        };

        window.downloadFile = (correctPass, url) => {
            if(!url) return;
            if(correctPass) {
                const userPass = prompt("보호된 링크입니다. 비밀번호를 입력하세요.");
                if(userPass === correctPass) window.open(url, '_blank');
                else if(userPass !== null) alert("비밀번호가 일치하지 않습니다.");
            } else {
                window.open(url, '_blank');
            }
        };
    </script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, addDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // [최종] 강사님의 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCecyxmwWpYXtlJczq6NYBNqfZrA3X_JMU",
            authDomain: "moneynworks.firebaseapp.com",
            projectId: "moneynworks",
            storageBucket: "moneynworks.firebasestorage.app",
            messagingSenderId: "395106061048",
            appId: "1:395106061048:web:b8e3cd08a508c21e24490d",
            measurementId: "G-V82NVJ8RQR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "moneynworks";
        const pathLectures = `artifacts/${appId}/public/data/lectures`;
        const pathCurriculum = `artifacts/${appId}/public/data/curriculum`;

        onAuthStateChanged(auth, (user) => {
            if(!user) {
                signInAnonymously(auth);
                return;
            }
            
            // 실시간 게시글 로드
            const q = query(collection(db, pathLectures));
            onSnapshot(q, (snapshot) => {
                const listContainer = document.getElementById('archive-list');
                let data = [];
                snapshot.forEach(doc => data.push(doc.data()));
                data.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                if(data.length === 0) {
                    listContainer.innerHTML = `<div class="py-20 text-center border-2 border-dashed border-slate-200 rounded-[3rem] text-slate-400 font-bold">아직 작성된 게시글이 없습니다.</div>`;
                    return;
                }

                listContainer.innerHTML = data.map(item => `
                    <article class="bg-white p-8 md:p-12 rounded-[2.5rem] border border-slate-100 shadow-sm transition-all hover:shadow-md">
                        <div class="flex items-center gap-4 mb-6">
                            <span class="px-4 py-1 bg-slate-900 text-white text-[10px] font-bold rounded-full uppercase tracking-tighter">${item.category}</span>
                            <span class="text-xs text-slate-400 font-semibold uppercase tracking-widest">${item.date}</span>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 mb-8 tracking-tighter leading-tight">${item.title}</h2>
                        <div class="post-content text-[1.05rem] mb-10 whitespace-pre-wrap font-medium">${item.content || ""}</div>
                        ${item.link ? `
                            <div class="pt-8 border-t border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                                <p class="text-[11px] text-slate-400 font-bold tracking-widest uppercase">참조 문서 및 링크 포함</p>
                                <button onclick="downloadFile('${item.password}', '${item.link}')" class="w-full md:w-auto bg-blue-600 text-white px-10 py-4 rounded-2xl text-xs font-bold hover:bg-slate-900 transition-all shadow-lg shadow-blue-100">링크 접속하기 ↗</button>
                            </div>
                        ` : ''}
                    </article>
                `).join('');
            });
        });

        // 저장 로직
        document.getElementById('tab-lecture').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, pathLectures), {
                    title: document.getElementById('lec-title').value,
                    content: document.getElementById('lec-content').value,
                    link: document.getElementById('lec-link').value,
                    password: document.getElementById('lec-pass').value,
                    category: document.getElementById('lec-cat').value,
                    date: new Date().toLocaleDateString(),
                    createdAt: Date.now()
                });
                alert("게시글이 성공적으로 등록되었습니다.");
                e.target.reset();
            } catch(err) { alert("오류: " + err.message); }
        };

        document.getElementById('tab-curriculum').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, pathCurriculum), {
                    title: document.getElementById('cur-title').value,
                    description: document.getElementById('cur-desc').value,
                    link: document.getElementById('cur-link').value,
                    order: Number(document.getElementById('cur-order').value)
                });
                alert("메인 커리큘럼 정보가 업데이트되었습니다.");
                e.target.reset();
            } catch(err) { alert("오류: " + err.message); }
        };
    </script>
</body>
</html>
